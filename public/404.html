<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index
      const path = window.location.pathname;
      const repo = '/MAI-T1D-chatbot';
      sessionStorage.setItem('redirectPath', path.replace(repo, '') || '/');
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
